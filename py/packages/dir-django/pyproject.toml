[project]
name = "poly-agntcy-dir-django"
version = "0.1.0a0"
description = "Django adapter for AGNTCY Directory Service"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = [
  "agntcy-dir",
  "django>=4.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/poly_agntcy_dir_django"]
