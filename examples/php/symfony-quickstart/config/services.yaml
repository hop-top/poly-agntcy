parameters:
    agntcy.endpoint: '%env(string:AGNTCY_ENDPOINT)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    HopTop\Agntcy\Dir\Client:
        arguments:
            $endpoint: '%agntcy.endpoint%'
            $credentials: '@HopTop\Agntcy\Dir\InsecureCredentials'

    HopTop\Agntcy\Dir\InsecureCredentials: ~

    App\Command\RegisterInventoryCommand: ~
