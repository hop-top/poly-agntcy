version: 2

builds:
  - binary: "poly-agntcy"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X hop.top/agntcy/poly-agntcy/internal/version.ver={{ .Version }}
        -X hop.top/agntcy/poly-agntcy/internal/version.commit={{ .Commit }}
        -X hop.top/agntcy/poly-agntcy/internal/version.date={{ .Date }}

archives:
  - format: tar.gz
    name_template: >-
      poly-agntcy_{{ .Version }}_{{ .Os }}_{{ .Arch }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
