version: 2
updates:
  - package-ecosystem: gomod
    directory: "/go"
    schedule:
      interval: weekly
    commit-message:
      prefix: "build(deps):"

  - package-ecosystem: cargo
    directory: "/rs"
    schedule:
      interval: weekly
    commit-message:
      prefix: "build(deps):"

  - package-ecosystem: composer
    directory: "/php"
    schedule:
      interval: weekly
    commit-message:
      prefix: "build(deps):"

  - package-ecosystem: npm
    directory: "/ts"
    schedule:
      interval: weekly
    commit-message:
      prefix: "build(deps):"

  - package-ecosystem: pip
    directory: "/py"
    schedule:
      interval: weekly
    commit-message:
      prefix: "build(deps):"
