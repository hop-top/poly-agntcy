name: CI (Rust)

on:
  push:
    branches: [main]
    paths: ["**/*.rs", "**/Cargo.toml", "**/Cargo.lock"]
  pull_request:
    branches: [main]
    paths: ["**/*.rs", "**/Cargo.toml", "**/Cargo.lock"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/rs

      - name: cargo fmt
        working-directory: sdk/rs
        run: mise exec -- cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: sdk/rs
        run: mise exec -- cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/rs

      - name: Run tests
        working-directory: sdk/rs
        run: mise exec -- cargo test --all-features --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/rs

      - name: Build workspace
        working-directory: sdk/rs
        run: mise exec -- cargo build --release --workspace --all-features
