name: CI (Go)

on:
  push:
    branches: [main]
    paths: ["**.go", "**/go.mod", "**/go.sum", "go.work", "go.work.sum"]
  pull_request:
    branches: [main]
    paths: ["**.go", "**/go.mod", "**/go.sum", "go.work", "go.work.sum"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [sdk/go, sdk/go/spiffe, cmd/agntcy, gen/go]
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: golangci-lint (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        run: mise exec -- golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: Run tests (workspace)
        run: mise exec -- go test -race -coverprofile=coverage.out ./sdk/go/... ./sdk/go/spiffe/... ./cmd/agntcy ./gen/go/...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: Build agntcy CLI
        working-directory: cmd/agntcy
        run: mise exec -- go build -o agntcy .
