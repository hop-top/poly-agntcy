name: CI (PHP)

on:
  push:
    branches: [main]
    paths: ["**.php", "**/composer.json", "**/composer.lock", "**/phpstan.neon", "**/phpunit.xml*"]
  pull_request:
    branches: [main]
    paths: ["**.php", "**/composer.json", "**/composer.lock", "**/phpstan.neon", "**/phpunit.xml*"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: composer install
        working-directory: sdk/php
        run: composer install --no-interaction --prefer-dist

      - name: phpstan
        working-directory: sdk/php
        run: composer run lint --no-interaction

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: composer install
        working-directory: sdk/php
        run: composer install --no-interaction --prefer-dist

      - name: phpunit
        working-directory: sdk/php
        run: composer test
