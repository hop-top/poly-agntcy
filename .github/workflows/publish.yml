name: publish
on:
  push:
    tags: ['*/v*']

jobs:
  publish:
    permissions:
      contents: read
      id-token: write
    uses: hop-top/.github/.github/workflows/publish-on-tag.yml@v0
    secrets:
      NPM_REGISTRY_TOKEN:   ${{ secrets.NPM_REGISTRY_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      PACKAGIST_USERNAME:   ${{ secrets.PACKAGIST_USERNAME }}
      PACKAGIST_TOKEN:      ${{ secrets.PACKAGIST_TOKEN }}
      GH_MIRROR_PAT:        ${{ secrets.GH_MIRROR_PAT }}
    with:
      ecosystems: |
        go:          { dir: sdk/go,                                 ecosystem: go,  mirror: hop-top/agntcy }
        go-spiffe:   { dir: sdk/go/spiffe,                          ecosystem: go,  mirror: hop-top/agntcy }
        rs:          { dir: sdk/rs/hop-top-agntcy-dir,              ecosystem: rs,  package: hop-top-agntcy-dir,        mirror: hop-top/agntcy-rs }
        rs-spiffe:   { dir: sdk/rs/hop-top-agntcy-dir-spiffe,       ecosystem: rs,  package: hop-top-agntcy-dir-spiffe, mirror: hop-top/agntcy-rs }
        php:         { dir: sdk/php/packages/dir,                   ecosystem: php, package: "hop-top/agntcy-dir",         mirror: hop-top/agntcy-php }
        php-laravel: { dir: adapters/laravel,                       ecosystem: php, package: "hop-top/agntcy-dir-laravel", mirror: hop-top/agntcy-php }
        php-symfony: { dir: adapters/symfony,                       ecosystem: php, package: "hop-top/agntcy-dir-symfony", mirror: hop-top/agntcy-php }
        php-spiffe:  { dir: sdk/php/packages/dir-spiffe,            ecosystem: php, package: "hop-top/agntcy-dir-spiffe",  mirror: hop-top/agntcy-php }
        ts-next:     { dir: adapters/next,                          ecosystem: ts,  package: "@hop-top/agntcy-dir-next",   mirror: hop-top/agntcy-ts }
        ts-hono:     { dir: adapters/hono,                          ecosystem: ts,  package: "@hop-top/agntcy-dir-hono",   mirror: hop-top/agntcy-ts }
        ts-express:  { dir: adapters/express,                       ecosystem: ts,  package: "@hop-top/agntcy-dir-express",mirror: hop-top/agntcy-ts }
        py-fastapi:  { dir: adapters/fastapi,                       ecosystem: py,  package: hop-top-agntcy-dir-fastapi,   mirror: hop-top/agntcy-py }
        py-flask:    { dir: adapters/flask,                         ecosystem: py,  package: hop-top-agntcy-dir-flask,     mirror: hop-top/agntcy-py }
        py-django:   { dir: adapters/django,                        ecosystem: py,  package: hop-top-agntcy-dir-django,    mirror: hop-top/agntcy-py }
