name: CI (TypeScript)

on:
  push:
    branches: [main]
    paths: ["**.ts", "**/package.json", "**/package-lock.json", "**/pnpm-lock.yaml"]
  pull_request:
    branches: [main]
    paths: ["**.ts", "**/package.json", "**/package-lock.json", "**/pnpm-lock.yaml"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: pnpm install
        working-directory: sdk/ts
        run: mise exec -- pnpm install --no-frozen-lockfile

      - name: Lint
        working-directory: sdk/ts
        run: mise exec -- pnpm -r lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: pnpm install
        working-directory: sdk/ts
        run: mise exec -- pnpm install --no-frozen-lockfile

      - name: Test
        working-directory: sdk/ts
        run: mise exec -- pnpm -r test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: pnpm install
        working-directory: sdk/ts
        run: mise exec -- pnpm install --no-frozen-lockfile

      - name: Build
        working-directory: sdk/ts
        run: mise exec -- pnpm -r build
