name: CI (Cross-Lang)

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  cross:
    name: Cross-language integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        continue-on-error: true
        with:
          install: true
          cache: true

      - name: Regenerate protobuf stubs
        continue-on-error: true
        run: mise run gen

      - name: Run cross-language integration
        continue-on-error: true
        run: mise run cross
