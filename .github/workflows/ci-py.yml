name: CI (Python)

on:
  push:
    branches: [main]
    paths: ["**.py", "**/pyproject.toml", "**/requirements*.txt", "**/uv.lock"]
  pull_request:
    branches: [main]
    paths: ["**.py", "**/pyproject.toml", "**/requirements*.txt", "**/uv.lock"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: uv sync
        working-directory: sdk/py
        run: mise exec -- uv sync

      - name: Ruff check
        working-directory: sdk/py
        run: mise exec -- uv run ruff check .

      - name: Ruff format check
        working-directory: sdk/py
        run: mise exec -- uv run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: uv sync
        working-directory: sdk/py
        run: mise exec -- uv sync

      - name: Mypy
        working-directory: sdk/py
        run: mise exec -- uv run mypy .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: uv sync
        working-directory: sdk/py
        run: mise exec -- uv sync

      - name: Pytest
        working-directory: sdk/py
        run: mise exec -- uv run pytest --cov -v
