name: CI (Python)

on:
  push:
    branches: [main]
    paths: ["**.py", "**/pyproject.toml", "**/requirements*.txt", "**/uv.lock"]
  pull_request:
    branches: [main]
    paths: ["**.py", "**/pyproject.toml", "**/requirements*.txt", "**/uv.lock"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: uv sync
        working-directory: sdk/py
        run: mise exec -- uv sync --all-packages

      - name: Ruff check
        working-directory: sdk/py
        run: mise exec -- uv run ruff check ../../adapters

      - name: Ruff format check
        working-directory: sdk/py
        run: mise exec -- uv run ruff format --check ../../adapters

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: uv sync
        working-directory: sdk/py
        run: mise exec -- uv sync --all-packages

      - name: Mypy
        working-directory: sdk/py
        run: mise exec -- uv run mypy ../../adapters/fastapi/src ../../adapters/flask/src ../../adapters/django/src

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      # <<< kit-managed: toolchain <<<

      - name: uv sync
        working-directory: sdk/py
        run: mise exec -- uv sync --all-packages

      - name: Pytest
        working-directory: sdk/py
        run: mise exec -- uv run pytest --import-mode=importlib --rootdir=. --cov -v ../../adapters
