# Managed by `kit init` — tools below the kit-managed marker are tracked
# against the kit tool-versions manifest. Add your own tools above the
# marker. Run `kit init --update` to refresh managed tools.

[tasks.gen]
description = "Regenerate protobuf stubs via buf"
run = "(cd contracts && buf generate)"

[tasks.lint]
description = "Lint all enabled languages"
run = [
  "(cd sdk/go && golangci-lint run ./...)",
  "(cd cmd/agntcy && golangci-lint run ./...)",
  "(cd sdk/rs && cargo clippy --workspace -- -D warnings)",
  "(cd sdk/ts && pnpm -r lint)",
  "(cd sdk/py && uv run ruff check)",
  "(cd sdk/php && vendor/bin/phpstan analyse)",
]

[tasks.test]
description = "Test all enabled languages"
run = [
  "go test ./sdk/go/... ./cmd/agntcy ./gen/go/...",
  "(cd sdk/rs && cargo test --workspace)",
  "(cd sdk/ts && pnpm -r test)",
  "(cd sdk/py && uv run pytest)",
  "(cd sdk/php && vendor/bin/phpunit)",
]

[tasks.cross]
description = "Cross-language integration example"
run = "(cd examples/cross && ./run.sh)"

[tasks.install_all]
description = "Install deps across all languages incl PHP + buf"
run = [
  "(cd sdk/go && go mod download)",
  "(cd cmd/agntcy && go mod download)",
  "(cd gen/go && go mod download)",
  "(cd sdk/rs && cargo fetch)",
  "(cd sdk/ts && pnpm install)",
  "(cd sdk/py && uv sync)",
  "(cd sdk/php && composer install --no-interaction) || true",
  "(cd contracts && buf dep update) || true",
]

# >>> kit-managed >>>
[tools]
go = "1.26"
node = "22"
pnpm = "9"
python = "3.13"
uv = "0.5"
rust = "1.94"
golangci-lint = "2.12"
ruff = "0.8"
lychee = "0.18"
hadolint = "2.12"
actionlint = "1.7"
shellcheck = "0.10"
shfmt = "3.10"
"npm:release-please" = "16"
buf = "1.70"

[env]
_.file = ".env"

[tasks.install]
description = "Install ecosystem dependencies (orchestrated by mise)"
run = [
  "go mod download",
  "pnpm install",
  "uv sync",
  "cargo fetch"
]
